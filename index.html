<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>끝말잇기 - made by 현우</title>
    <style>
        /* 전역 설정 및 폰트 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; user-select: none; }
        body { 
            margin: 0; padding: 0; 
            background-color: #0f172a; 
            color: #f8fafc; 
            height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
        }

        /* 인트로 연출 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s ease-in-out;
        }
        .intro-text {
            font-size: 3rem; font-weight: 800; letter-spacing: 5px;
            opacity: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text; color: transparent;
            animation: fadeIn 1s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        
        /* 메인 게임 UI (글래스모피즘 디자인) */
        #game-container {
            width: 100%; max-width: 500px; height: 90vh;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column;
            opacity: 0; transform: translateY(20px);
            transition: all 1s ease;
        }
        #game-container.show { opacity: 1; transform: translateY(0); }

        /* 헤더 */
        .header {
            padding: 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 1.5rem; font-weight: 700; color: #fff;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        /* 채팅 (게임 진행) 영역 */
        #chat-box {
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
        }
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        .msg-bubble {
            max-width: 75%; padding: 12px 18px; border-radius: 20px; font-size: 1.1rem;
            animation: slideUp 0.3s ease-out; font-weight: 500;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .ai-msg {
            align-self: flex-start; background: #334155; border-bottom-left-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-bottom-right-radius: 5px; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        /* 입력 영역 */
        .input-area {
            display: flex; padding: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); gap: 10px;
        }
        input[type="text"] {
            flex: 1; padding: 15px; border-radius: 12px; border: none;
            background: rgba(15, 23, 42, 0.6); color: #fff; font-size: 1.1rem; outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        input[type="text"]:focus { box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 0 2px #818cf8; }
        
        button {
            padding: 0 25px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.1rem;
            background: linear-gradient(135deg, #10b981, #059669); color: white; cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <!-- 1. 인트로 씬 -->
    <div id="intro-screen">
        <div id="intro-title" class="intro-text">끝말잇기</div>
        <div id="intro-author" class="intro-text" style="display: none;">made by 현우</div>
    </div>

    <!-- 2. 메인 게임 씬 -->
    <div id="game-container">
        <div class="header">끝말잇기 AI 대결</div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="word-input" placeholder="단어를 입력하세요..." autocomplete="off">
            <button id="submit-btn">전송</button>
        </div>
    </div>

    <script>
        // ==========================================
        // [1] 강력한 보안 및 소스코드 보기 차단 로직
        // ==========================================
        // 1. 우클릭 차단
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // 2. 단축키 차단 (F12, Ctrl+U, Ctrl+Shift+I 등)
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || 
               (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
               (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });

        // 3. 디버거 트랩 (개발자 도구를 열면 무한 디버거가 걸려 코드를 볼 수 없게 만듦)
        setInterval(() => {
            (function() { return false; }['constructor']('debugger')());
        }, 50);

        // ==========================================
        // [2] 인트로 연출 로직 (요청하신 시간 타이밍 완벽 적용)
        // ==========================================
        window.onload = () => {
            const introTitle = document.getElementById('intro-title');
            const introAuthor = document.getElementById('intro-author');
            const introScreen = document.getElementById('intro-screen');
            const gameContainer = document.getElementById('game-container');

            // 처음 '끝말잇기' 2초 유지 후 블랙스크린
            setTimeout(() => {
                introTitle.style.display = 'none';
                
                // 1초 후 'made by 현우' 등장
                setTimeout(() => {
                    introAuthor.style.display = 'block';
                    
                    // 2초 후 인트로 페이드아웃 및 게임 시작
                    setTimeout(() => {
                        introScreen.style.opacity = '0';
                        setTimeout(() => {
                            introScreen.style.display = 'none';
                            gameContainer.classList.add('show');
                            startGame(); // 게임 초기화 함수 호출
                        }, 1000);
                    }, 2000);
                }, 1000);
            }, 2000);
        };

        // ==========================================
        // [3] 끝말잇기 게임 로직 및 AI
        // ==========================================
        const chatBox = document.getElementById('chat-box');
        const wordInput = document.getElementById('word-input');
        const submitBtn = document.getElementById('submit-btn');

        let currentWord = "컴퓨터"; 
        let usedWords = ["컴퓨터"];

        // 간단한 AI 단어 사전 (고품질 플레이를 위한 기본 데이터)
        const aiDictionary = [
            "터미널", "널뛰기", "기차", "차량", "양심", "심장", "장미", "미술", "술래잡기", "기러기",
            "기구", "구두", "두부", "부자", "자전거", "거미", "미로", "로봇", "봇물", "물안경", 
            "경찰", "찰흙", "흙더미", "미용실", "실과", "과거", "거인", "인간", "간판", "판사", 
            "사과", "과일", "일기", "기억", "억양", "양파", "파도", "도자기", "기계", "계산기",
            "기둥", "둥지", "지구", "구슬", "슬픔", "픔(끝말 방어용은 아님)", "나비", "비행기"
        ];

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg-bubble ${sender === 'user' ? 'user-msg' : 'ai-msg'}`;
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function startGame() {
            addMessage(`AI가 먼저 시작합니다! 제시어: [ ${currentWord} ]`, 'ai');
            wordInput.focus();
        }

        function handleTurn() {
            const userWord = wordInput.value.trim();
            if(!userWord) return;

            // 1. 단어 길이 체크
            if(userWord.length < 2) {
                alert("두 글자 이상의 단어를 입력하세요!");
                return;
            }

            // 2. 끝말이 이어지는지 체크
            const lastChar = currentWord.slice(-1);
            const firstChar = userWord.charAt(0);
            
            // 두음법칙 등 복잡한 예외는 제외한 엄격한 룰
            if(lastChar !== firstChar) {
                alert(`'${lastChar}'(으)로 시작하는 단어를 입력해야 합니다!`);
                return;
            }

            // 3. 중복 단어 체크
            if(usedWords.includes(userWord)) {
                alert("이미 사용된 단어입니다!");
                wordInput.value = '';
                return;
            }

            // 유저 턴 성공
            addMessage(userWord, 'user');
            usedWords.push(userWord);
            currentWord = userWord;
            wordInput.value = '';
            wordInput.disabled = true;
            submitBtn.disabled = true;

            // AI 턴 진행 (약간의 생각하는 시간 딜레이 추가)
            setTimeout(aiTurn, 800 + Math.random() * 1000);
        }

        function aiTurn() {
            const lastChar = currentWord.slice(-1);
            
            // 사전에 있는 단어 중, 현재 끝말과 일치하며 아직 안 쓴 단어 찾기
            let nextWord = aiDictionary.find(word => word.charAt(0) === lastChar && !usedWords.includes(word));

            if (nextWord) {
                addMessage(nextWord, 'ai');
                usedWords.push(nextWord);
                currentWord = nextWord;
                wordInput.disabled = false;
                submitBtn.disabled = false;
                wordInput.focus();
            } else {
                // AI가 단어를 못 찾았을 때 유저 승리 처리
                addMessage("...제가 졌습니다. 더 이상 떠오르는 단어가 없네요! 현우님의 승리입니다! 🎉", 'ai');
            }
        }

        // 엔터키 및 버튼 클릭 이벤트
        submitBtn.addEventListener('click', handleTurn);
        wordInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') handleTurn();
        });
    </script>
</body>
</html>
