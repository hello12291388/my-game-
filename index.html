<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>끝말잇기 - made by 현우</title>
<style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; user-select: none; }
    html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #050505;
        color: #f8fafc;
    }
    body {
        min-height: 100vh; min-height: 100dvh;
        display: flex; justify-content: center; align-items: center;
        overflow: hidden;
    }

    /* ===================== 1. 인트로 씬 ===================== */
    #intro-screen {
        position: fixed; inset: 0; background-color: #000; z-index: 9999;
        display: flex; justify-content: center; align-items: center;
        transition: opacity 1s ease-in-out;
    }
    .intro-text {
        font-size: clamp(2.2rem, 8vw, 4rem); font-weight: 900; letter-spacing: 10px;
        opacity: 0; text-align: center; padding: 0 20px;
        color: #ffffff;
        text-shadow: 0 0 25px rgba(255,255,255,0.85), 0 0 55px rgba(56,189,248,0.55);
        animation: fadeIn 1s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ===================== 공통 카드형 패널 (로그인/가입/로비/설정) ===================== */
    .panel {
        display: none; flex-direction: column; gap: 8px;
        width: min(90vw, 380px);
        padding: 36px 30px;
        background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
        opacity: 0; transform: translateY(20px);
        transition: opacity .5s ease, transform .5s ease;
        z-index: 500;
    }
    .panel.active { display: flex; opacity: 1; transform: translateY(0); }
    .panel h2 {
        margin: 0 0 10px; text-align: center; font-size: 1.6rem; font-weight: 800;
        color: #fff; letter-spacing: 2px;
    }
    .sub-hint { font-size: 0.8rem; color: #94a3b8; text-align: center; margin: -4px 0 8px; }

    input {
        width: 100%; padding: 13px 14px; margin: 5px 0; border-radius: 10px; border: none;
        background: rgba(15, 23, 42, 0.8); color: #fff; font-size: 1rem; outline: none;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); transition: .2s;
    }
    input:focus { box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 0 2px #c084fc; }

    button {
        width: 100%; padding: 13px; margin-top: 8px; border-radius: 10px; border: none;
        cursor: pointer; font-weight: bold; font-size: 1rem; transition: transform .1s ease, filter .2s;
        background: linear-gradient(135deg, #60a5fa, #2563eb); color: white;
    }
    button:hover { filter: brightness(1.1); }
    button:active { transform: scale(0.97); }
    .btn-ghost {
        background: rgba(255,255,255,0.08); color: #cbd5e1; box-shadow: none;
    }
    .btn-purple { background: linear-gradient(135deg, #c084fc, #9333ea); }
    .btn-danger { background: linear-gradient(135deg, #f87171, #dc2626); }

    #score-display { text-align: center; font-size: 1.05rem; margin-bottom: 6px; color: #e2e8f0; }
    #score-display .nick { color: #60a5fa; font-weight: 800; }
    #score-display .pts { color: #4ade80; font-weight: 800; }

    .err-text { color: #f87171; font-size: 0.85rem; text-align: center; min-height: 1.1em; margin: -2px 0 4px; }

    /* ===================== 2. 난이도 선택 씬 ===================== */
    #difficulty-screen {
        position: fixed; inset: 0;
        background: radial-gradient(circle at center, #1e293b, #0f172a);
        z-index: 9000; display: none; flex-direction: column; justify-content: center; align-items: center; gap: 26px;
        opacity: 0; transition: opacity 1s ease;
    }
    .diff-title { font-size: clamp(1.6rem, 6vw, 2.5rem); font-weight: 800; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
    .diff-btn {
        padding: 15px 50px; font-size: 1.3rem; font-weight: bold; border-radius: 30px; border: none;
        cursor: pointer; transition: all 0.3s ease; width: min(80vw, 250px); margin: 0;
    }
    .btn-easy { background: linear-gradient(135deg, #4ade80, #16a34a); color: white; box-shadow: 0 0 20px rgba(74,222,128,.4); }
    .btn-normal { background: linear-gradient(135deg, #60a5fa, #2563eb); color: white; box-shadow: 0 0 20px rgba(96,165,250,.4); }
    .btn-hard { background: linear-gradient(135deg, #f87171, #dc2626); color: white; box-shadow: 0 0 20px rgba(248,113,113,.4); }
    .diff-btn:hover { transform: scale(1.05); }
    .diff-back { background: rgba(255,255,255,.08); color: #cbd5e1; width: min(80vw,250px); padding: 12px; border-radius: 20px; margin-top: 6px; }

    /* ===================== 3. 메인 게임 UI ===================== */
    #game-container {
        width: min(94vw, 500px); height: min(90vh, 90dvh);
        background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
        flex-direction: column; display: none;
        opacity: 0; transform: translateY(20px); transition: all 1s ease;
    }
    #game-container.show { opacity: 1; transform: translateY(0); display: flex; }

    .header {
        padding: 18px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1);
        font-size: 1.3rem; font-weight: 700; color: #fff;
        display: flex; justify-content: space-between; align-items: center; gap: 10px;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .diff-badge { font-size: 0.85rem; padding: 5px 12px; border-radius: 10px; background: rgba(0,0,0,0.5); }
    .exit-btn { width: auto; padding: 8px 14px; font-size: 0.85rem; margin: 0; background: rgba(255,255,255,0.08); color: #cbd5e1; box-shadow: none; }

    #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

    .msg-bubble {
        max-width: 75%; padding: 12px 18px; border-radius: 20px; font-size: 1.05rem;
        animation: slideUp .3s ease-out; font-weight: 500; word-break: break-all;
    }
    @keyframes slideUp { from { opacity:0; transform: translateY(10px);} to { opacity:1; transform: translateY(0);} }

    .ai-msg { align-self: flex-start; background: #334155; border-bottom-left-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,.3); }
    .user-msg { align-self: flex-end; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-bottom-right-radius: 5px; box-shadow: 0 4px 15px rgba(139,92,246,.4); }
    .sys-msg { align-self: center; background: transparent; color: #94a3b8; font-size: 0.85rem; text-align: center; }

    .input-area { display: flex; padding: 16px 20px 20px; border-top: 1px solid rgba(255,255,255,0.1); gap: 10px; position: relative; }
    input[type="text"].word-input {
        flex: 1; margin: 0; padding: 15px; border-radius: 12px;
    }
    button#submit-btn { width: auto; padding: 0 25px; margin: 0; border-radius: 12px; background: linear-gradient(135deg, #c084fc, #9333ea); }
    #loading { position: absolute; top: -26px; left: 50%; transform: translateX(-50%); color: #38bdf8; font-size: 0.85rem; font-weight: bold; display: none; }

    .bgm-toggle { display: flex; align-items: center; gap: 8px; }
    .bgm-toggle button { width: auto; padding: 8px 14px; font-size: 0.85rem; margin: 4px 0; }
</style>
</head>
<body>

<!-- 1. 인트로 -->
<div id="intro-screen">
    <div id="intro-title" class="intro-text">끝말잇기</div>
    <div id="intro-author" class="intro-text" style="display:none; font-size: clamp(1.3rem, 5vw, 2rem); letter-spacing: 4px;">made by 현우</div>
</div>

<!-- 로그인 -->
<div id="login-panel" class="panel">
    <h2>로그인</h2>
    <div class="sub-hint">계정으로 로그인하고 기록을 저장하세요</div>
    <input type="text" id="log-id" placeholder="아이디">
    <input type="password" id="log-pw" placeholder="비밀번호">
    <input type="text" id="log-faith" placeholder="암구호: 현우를찬양하라">
    <div class="err-text" id="login-err"></div>
    <button onclick="login()">로그인</button>
    <button class="btn-ghost" onclick="showPanel('register-panel')">회원가입</button>
    <button class="btn-ghost" onclick="showPanel('settings-panel')">설정</button>
</div>

<!-- 회원가입 -->
<div id="register-panel" class="panel">
    <h2>회원가입</h2>
    <input type="text" id="reg-id" placeholder="아이디">
    <input type="password" id="reg-pw" placeholder="비밀번호">
    <input type="text" id="reg-nick" placeholder="닉네임">
    <div class="err-text" id="register-err"></div>
    <button onclick="register()">가입하기</button>
    <button class="btn-ghost" onclick="showPanel('login-panel')">뒤로가기</button>
</div>

<!-- 설정 -->
<div id="settings-panel" class="panel">
    <h2>설정</h2>
    <div class="bgm-toggle" style="justify-content:center;">
        <button id="bgm-btn" class="btn-purple" onclick="toggleBGM()">🔈 BGM 끄기</button>
    </div>
    <button class="btn-ghost" onclick="alert('가이드: 제시어의 마지막 글자로 시작하는 단어를 입력하고 전송하세요! 두음법칙(예: 라→나)도 자동으로 인정됩니다. 회원가입 후 로그인하면 점수가 저장돼요.')">안내 가이드</button>
    <button class="btn-ghost" onclick="showPanel('login-panel')">뒤로가기</button>
</div>

<!-- 로비 -->
<div id="lobby-panel" class="panel">
    <h2>로비</h2>
    <div id="score-display">점수 정보 없음</div>
    <button class="btn-purple" onclick="goToDifficultySelect()">게임 시작</button>
    <button class="btn-ghost" onclick="alert('랭킹 시스템은 현재 준비 중입니다.')">랭킹 (준비중)</button>
    <button class="btn-ghost" onclick="showPanel('settings-panel')">설정</button>
    <button class="btn-danger" onclick="logout()">로그아웃</button>
</div>

<!-- 2. 난이도 선택 -->
<div id="difficulty-screen">
    <div class="diff-title">난이도 선택</div>
    <button class="diff-btn btn-easy" onclick="setDifficulty('easy')">초급 (Easy)</button>
    <button class="diff-btn btn-normal" onclick="setDifficulty('normal')">중급 (Normal)</button>
    <button class="diff-btn btn-hard" onclick="setDifficulty('hard')">지옥 (Hell)</button>
    <button class="diff-back" onclick="backToLobbyFromDifficulty()">← 로비로</button>
</div>

<!-- 3. 게임 화면 -->
<div id="game-container">
    <div class="header">
        <div class="header-left">
            <span>AI 대결</span>
            <span id="diff-badge" class="diff-badge">난이도</span>
        </div>
        <button class="exit-btn" onclick="exitGame()">나가기</button>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
        <div id="loading">생각 중...</div>
        <input type="text" class="word-input" id="word-input" placeholder="단어를 입력하세요..." autocomplete="off">
        <button id="submit-btn">전송</button>
    </div>
</div>

<!-- BGM -->
<audio id="bgm" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
/* ========================= 보안(개발자도구 차단) ========================= */
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && e.key === 'U')) {
        e.preventDefault();
    }
});

/* ========================= 공용 상태 ========================= */
let userData = JSON.parse(localStorage.getItem('gameUsers')) || {};
let currentUser = null;
let isBgmOn = false;
const bgmAudio = document.getElementById('bgm');

function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* BGM: 재생 실패(자동재생 정책 등) 시 조용히 무시하고 버튼 라벨은 항상 실제 상태와 동기화 */
function toggleBGM() {
    isBgmOn = !isBgmOn;
    const btn = document.getElementById('bgm-btn');
    if (isBgmOn) {
        bgmAudio.play().then(() => {
            btn.textContent = '🔊 BGM 끄기';
        }).catch(() => {
            isBgmOn = false;
            btn.textContent = '🔈 BGM 켜기';
            alert('BGM 재생에 실패했습니다. 화면을 한 번 더 클릭한 뒤 다시 시도해주세요.');
        });
    } else {
        bgmAudio.pause();
        btn.textContent = '🔈 BGM 켜기';
    }
}

/* ========================= 회원가입 / 로그인 ========================= */
function register() {
    const id = document.getElementById('reg-id').value.trim();
    const pw = document.getElementById('reg-pw').value;
    const nick = document.getElementById('reg-nick').value.trim();
    const err = document.getElementById('register-err');
    err.textContent = '';

    if (!id || !pw || !nick) { err.textContent = '모든 항목을 입력해주세요.'; return; }
    if (userData[id]) { err.textContent = '이미 존재하는 아이디입니다.'; return; }

    userData[id] = { pw, nick, score: 0 };
    localStorage.setItem('gameUsers', JSON.stringify(userData));
    alert('가입 완료! 로그인 해주세요.');
    document.getElementById('reg-id').value = '';
    document.getElementById('reg-pw').value = '';
    document.getElementById('reg-nick').value = '';
    showPanel('login-panel');
}

function login() {
    const id = document.getElementById('log-id').value.trim();
    const pw = document.getElementById('log-pw').value;
    const faith = document.getElementById('log-faith').value.trim();
    const err = document.getElementById('login-err');
    err.textContent = '';

    if (!userData[id]) { err.textContent = '존재하지 않는 계정입니다.'; return; }
    if (userData[id].pw !== pw) { err.textContent = '비밀번호가 일치하지 않습니다.'; return; }
    if (faith !== '현우를찬양하라') { err.textContent = '암구호가 올바르지 않습니다.'; return; }

    currentUser = id;
    document.getElementById('log-pw').value = '';
    document.getElementById('log-faith').value = '';
    refreshLobbyScore();
    showPanel('lobby-panel');
}

function logout() {
    currentUser = null;
    document.getElementById('log-id').value = '';
    showPanel('login-panel');
}

function refreshLobbyScore() {
    if (!currentUser || !userData[currentUser]) return;
    const u = userData[currentUser];
    document.getElementById('score-display').innerHTML =
        `<span class="nick">${u.nick}</span>님 | 점수 <span class="pts">${u.score}</span>`;
}

function addScore(points) {
    if (!currentUser || !userData[currentUser]) return;
    userData[currentUser].score += points;
    localStorage.setItem('gameUsers', JSON.stringify(userData));
    refreshLobbyScore();
}

/* ========================= 화면 전환 (로비 → 난이도 → 게임) ========================= */
function goToDifficultySelect() {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    const diffScreen = document.getElementById('difficulty-screen');
    diffScreen.style.display = 'flex';
    requestAnimationFrame(() => diffScreen.style.opacity = '1');
}

function backToLobbyFromDifficulty() {
    const diffScreen = document.getElementById('difficulty-screen');
    diffScreen.style.opacity = '0';
    setTimeout(() => {
        diffScreen.style.display = 'none';
        refreshLobbyScore();
        showPanel('lobby-panel');
    }, 500);
}

function exitGame() {
    const gc = document.getElementById('game-container');
    gc.classList.remove('show');
    setTimeout(() => {
        gc.style.display = 'none';
        refreshLobbyScore();
        showPanel('lobby-panel');
    }, 500);
}

/* ========================= 인트로 시퀀스 ========================= */
window.onload = () => {
    const introTitle = document.getElementById('intro-title');
    const introAuthor = document.getElementById('intro-author');
    const introScreen = document.getElementById('intro-screen');

    setTimeout(() => {
        introTitle.style.display = 'none';
        setTimeout(() => {
            introAuthor.style.display = 'block';
            setTimeout(() => {
                introScreen.style.opacity = '0';
                setTimeout(() => {
                    introScreen.style.display = 'none';
                    showPanel('login-panel');
                }, 1000);
            }, 2000);
        }, 1000);
    }, 2000);
};

/* ========================= 끝말잇기 게임 로직 ========================= */
let gameDifficulty = 'normal';
let currentWord = "컴퓨터";
let usedWords = ["컴퓨터"];
let userWordsThisRound = 0;

const fallbackBrain = ["터미널", "기차", "차량", "양심", "심장", "장미", "미술", "노을", "을지문덕"];

const chatBox = document.getElementById('chat-box');
const wordInput = document.getElementById('word-input');
const submitBtn = document.getElementById('submit-btn');
const loading = document.getElementById('loading');

async function checkRealWord(word) {
    try {
        const response = await fetch(`https://ko.wiktionary.org/w/api.php?action=query&titles=${encodeURIComponent(word)}&format=json&origin=*`);
        const data = await response.json();
        if (data.query.pages["-1"]) return false;
        return true;
    } catch (error) {
        return true;
    }
}

async function fetchWordsFromDictionary(prefix) {
    try {
        const response = await fetch(`https://ko.wiktionary.org/w/api.php?action=query&list=allpages&apprefix=${encodeURIComponent(prefix)}&aplimit=100&format=json&origin=*`);
        const data = await response.json();
        if (data.query && data.query.allpages) {
            return data.query.allpages
                .map(p => p.title)
                .filter(title => title.length >= 2 && title.length <= 6 && /^[가-힣]+$/.test(title));
        }
        return [];
    } catch (e) {
        return [];
    }
}

function addMessage(text, sender) {
    const msgDiv = document.createElement('div');
    msgDiv.className = sender === 'sys' ? 'sys-msg' : `msg-bubble ${sender === 'user' ? 'user-msg' : 'ai-msg'}`;
    msgDiv.textContent = text;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function setDifficulty(level) {
    gameDifficulty = level;
    const diffScreen = document.getElementById('difficulty-screen');
    diffScreen.style.opacity = '0';

    const badge = document.getElementById('diff-badge');
    if (level === 'easy')   { badge.textContent = '초급'; badge.style.color = '#4ade80'; }
    if (level === 'normal') { badge.textContent = '중급'; badge.style.color = '#60a5fa'; }
    if (level === 'hard')   { badge.textContent = '지옥'; badge.style.color = '#f87171'; }

    setTimeout(() => {
        diffScreen.style.display = 'none';
        chatBox.innerHTML = '';
        currentWord = "컴퓨터";
        usedWords = ["컴퓨터"];
        userWordsThisRound = 0;
        wordInput.disabled = false; submitBtn.disabled = false;

        const gc = document.getElementById('game-container');
        gc.style.display = 'flex';
        requestAnimationFrame(() => gc.classList.add('show'));
        startGame();
    }, 1000);
}

function startGame() {
    addMessage(`[ ${gameDifficulty.toUpperCase()} 모드 ] 게임을 시작합니다.`, 'sys');
    addMessage(`제시어: [ ${currentWord} ]`, 'ai');
    wordInput.focus();
}

function applyDueum(char) {
    const dueumMap = { '랴':'야','려':'여','례':'예','료':'요','류':'유','리':'이','녀':'여','뇨':'요','뉴':'유','니':'이','라':'나','로':'노','루':'누','르':'느' };
    return dueumMap[char] || char;
}

async function handleTurn() {
    const userWord = wordInput.value.trim();
    if (!userWord) return;

    if (userWord.length < 2) { alert("두 글자 이상의 단어를 입력하세요!"); return; }

    const lastChar = currentWord.slice(-1);
    const firstChar = userWord.charAt(0);
    const dueumFirstChar = applyDueum(firstChar);

    if (lastChar !== firstChar && lastChar !== dueumFirstChar) {
        alert(`'${lastChar}'(으)로 시작하는 단어를 입력해야 합니다!`);
        return;
    }

    if (usedWords.includes(userWord)) {
        alert("이미 사용된 단어입니다!"); wordInput.value = ''; return;
    }

    wordInput.disabled = true; submitBtn.disabled = true;
    loading.style.display = 'block';

    const isReal = await checkRealWord(userWord);

    if (!isReal) {
        alert(`국어사전에 '${userWord}'(이)라는 단어는 없습니다!`);
        loading.style.display = 'none';
        wordInput.disabled = false; submitBtn.disabled = false;
        wordInput.value = ''; wordInput.focus();
        return;
    }

    addMessage(userWord, 'user');
    usedWords.push(userWord);
    currentWord = userWord;
    userWordsThisRound++;
    wordInput.value = '';

    const mult = gameDifficulty === 'hard' ? 3 : (gameDifficulty === 'normal' ? 2 : 1);
    addScore(10 * mult);

    setTimeout(aiTurn, 300);
}

async function aiTurn() {
    loading.style.display = 'block';
    const lastChar = currentWord.slice(-1);
    const dueumLastChar = applyDueum(lastChar);

    let apiWords1 = await fetchWordsFromDictionary(lastChar);
    let apiWords2 = lastChar !== dueumLastChar ? await fetchWordsFromDictionary(dueumLastChar) : [];

    let combinedWords = [...apiWords1, ...apiWords2].filter(word => !usedWords.includes(word));

    if (combinedWords.length === 0) {
        combinedWords = fallbackBrain.filter(word =>
            (word.charAt(0) === lastChar || word.charAt(0) === dueumLastChar) && !usedWords.includes(word)
        );
    }

    let nextWord = null;

    if (combinedWords.length > 0) {
        if (gameDifficulty === 'hard') {
            const hardEnds = ['늄','륨','꾼','녘','슭','릇','쁨','엌','칩','즙'];
            nextWord = combinedWords.find(w => hardEnds.includes(w.slice(-1))) || combinedWords[Math.floor(Math.random() * combinedWords.length)];
        } else if (gameDifficulty === 'easy') {
            const easyWords = combinedWords.filter(w => w.length === 2);
            nextWord = easyWords.length > 0 ? easyWords[Math.floor(Math.random() * easyWords.length)] : combinedWords[0];
        } else {
            nextWord = combinedWords[Math.floor(Math.random() * combinedWords.length)];
        }
    }

    loading.style.display = 'none';

    if (nextWord) {
        addMessage(nextWord, 'ai');
        usedWords.push(nextWord);
        currentWord = nextWord;
        wordInput.disabled = false; submitBtn.disabled = false; wordInput.focus();
    } else {
        addMessage("크윽... 전 세계 사전을 다 뒤졌지만 더 이상 단어가 없습니다. 현우님의 대승리입니다! 🏆", 'ai');
        addMessage("[ 게임 종료 ]", 'sys');

        const mult = gameDifficulty === 'hard' ? 3 : (gameDifficulty === 'normal' ? 2 : 1);
        addScore(50 * mult);

        wordInput.disabled = true; submitBtn.disabled = true;

        const backBtn = document.createElement('button');
        backBtn.textContent = '로비로 돌아가기';
        backBtn.className = 'btn-purple';
        backBtn.style.marginTop = '10px';
        backBtn.onclick = exitGame;
        chatBox.appendChild(backBtn);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
}

submitBtn.addEventListener('click', handleTurn);
wordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleTurn(); });
</script>
</body>
</html>
