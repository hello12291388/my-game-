<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>끝말잇기 - made by 현우</title>
<style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; user-select: none; }
    html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #050505; color: #f8fafc;
        overflow: hidden;
    }
    body {
        min-height: 100vh; min-height: 100dvh;
        display: flex; justify-content: center; align-items: center;
    }

    /* ===================== 고퀄리티 시네마틱 인트로 ===================== */
    #intro-screen {
        position: fixed; inset: 0; background-color: #030712; z-index: 9999;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden;
    }
    /* 배경 광원(Orb) 애니메이션 */
    .orb { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0; z-index: 1; }
    .orb1 { width: 400px; height: 400px; background: #38bdf8; top: -100px; left: -100px; animation: floatOrb 8s infinite alternate ease-in-out, fadeOrb 3s forwards; }
    .orb2 { width: 500px; height: 500px; background: #c084fc; bottom: -150px; right: -150px; animation: floatOrb 10s infinite alternate ease-in-out, fadeOrb 3s 0.5s forwards; }
    .orb3 { width: 300px; height: 300px; background: #312e81; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulseOrb 4s infinite alternate, fadeOrb 3s 1s forwards; }
    
    @keyframes fadeOrb { to { opacity: 0.4; } }
    @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }
    @keyframes pulseOrb { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.2; } 100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.6; } }

    .glass-overlay { position: absolute; inset: 0; backdrop-filter: blur(10px); z-index: 2; }

    .intro-text-container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; }
    
    #intro-subtitle {
        font-size: clamp(0.8rem, 3vw, 1.2rem); font-weight: 300; letter-spacing: 12px;
        color: #94a3b8; margin-bottom: 20px; opacity: 0; transform: translateY(20px);
    }
    #intro-title {
        font-size: clamp(3rem, 12vw, 6rem); font-weight: 900; color: #fff;
        text-shadow: 0 0 20px rgba(56,189,248,0.5), 0 0 40px rgba(192,132,252,0.5);
        opacity: 0; transform: scale(0.9); letter-spacing: 0px;
    }
    #intro-author {
        margin-top: 40px; text-align: center; opacity: 0; transform: translateY(30px);
    }
    #intro-author .made-by { font-size: 0.9rem; font-weight: 400; color: #64748b; letter-spacing: 5px; }
    #intro-author .author-name {
        font-size: clamp(2rem, 8vw, 4rem); font-weight: 800; letter-spacing: 10px;
        background: linear-gradient(135deg, #facc15, #f87171, #c084fc);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        text-shadow: 0 10px 30px rgba(192,132,252,0.4); display: inline-block; margin-top: 10px;
    }

    /* ===================== 공통 UI ===================== */
    .panel {
        display: none; flex-direction: column; gap: 8px;
        width: min(90vw, 380px); padding: 36px 30px;
        background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(25px);
        border: 1px solid rgba(255,255,255,0.05); border-radius: 24px;
        box-shadow: 0 30px 60px -15px rgba(0,0,0,1);
        opacity: 0; transform: translateY(20px);
        transition: opacity .5s ease, transform .5s ease; z-index: 500;
    }
    .panel.active { display: flex; opacity: 1; transform: translateY(0); }
    .panel h2 { margin: 0 0 10px; text-align: center; font-size: 1.8rem; font-weight: 900; color: #fff; letter-spacing: 2px; }
    .sub-hint { font-size: 0.85rem; color: #94a3b8; text-align: center; margin: -4px 0 8px; }

    input {
        width: 100%; padding: 14px 16px; margin: 5px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
        background: rgba(0, 0, 0, 0.3); color: #fff; font-size: 1rem; outline: none; transition: .3s;
    }
    input:focus { border-color: #c084fc; box-shadow: 0 0 15px rgba(192,132,252,0.3); background: rgba(0, 0, 0, 0.5); }

    button {
        width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px; border: none;
        cursor: pointer; font-weight: 800; font-size: 1.05rem; transition: transform .1s ease, filter .2s;
        background: linear-gradient(135deg, #3b82f6, #2563eb); color: white;
        box-shadow: 0 10px 20px -10px rgba(59,130,246,0.6);
    }
    button:hover { filter: brightness(1.15); }
    button:active { transform: scale(0.96); }
    
    .btn-ghost { background: rgba(255,255,255,0.05); color: #cbd5e1; box-shadow: none; }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); }
    .btn-purple { background: linear-gradient(135deg, #a855f7, #7e22ce); box-shadow: 0 10px 20px -10px rgba(168,85,247,0.6); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 10px 20px -10px rgba(239,68,68,0.6); }
    .btn-green { background: linear-gradient(135deg, #22c55e, #15803d); box-shadow: 0 10px 20px -10px rgba(34,197,94,0.6); }

    #score-display { text-align: center; font-size: 1.1rem; margin-bottom: 10px; color: #e2e8f0; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; }
    #score-display .nick { color: #38bdf8; font-weight: 900; }
    #score-display .pts { color: #4ade80; font-weight: 900; text-shadow: 0 0 10px rgba(74,222,128,0.4); }
    .err-text { color: #f87171; font-size: 0.85rem; text-align: center; min-height: 1.1em; margin: -2px 0 4px; }

    /* ===================== 랭킹 리스트 ===================== */
    #ranking-list {
        display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; padding-right: 5px; margin-bottom: 10px;
    }
    #ranking-list::-webkit-scrollbar { width: 4px; }
    #ranking-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .rank-item {
        display: flex; justify-content: space-between; padding: 12px 15px;
        background: rgba(0, 0, 0, 0.4); border-radius: 10px; font-size: 0.95rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.05);
    }
    .rank-1 { background: linear-gradient(90deg, rgba(250,204,21,0.2), rgba(0,0,0,0.4)); border-left: 4px solid #facc15; }
    .rank-2 { background: linear-gradient(90deg, rgba(148,163,184,0.2), rgba(0,0,0,0.4)); border-left: 4px solid #94a3b8; }
    .rank-3 { background: linear-gradient(90deg, rgba(217,119,6,0.2), rgba(0,0,0,0.4)); border-left: 4px solid #d97706; }

    /* ===================== 메인 게임 UI ===================== */
    #game-container {
        width: min(95vw, 550px); height: min(92vh, 92dvh);
        background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(30px);
        border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
        box-shadow: 0 40px 80px -20px rgba(0,0,0,1);
        flex-direction: column; display: none; overflow: hidden;
        opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #game-container.show { opacity: 1; transform: translateY(0); display: flex; }

    .header {
        padding: 20px 24px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05);
        font-size: 1.4rem; font-weight: 800; color: #fff; background: rgba(0,0,0,0.2);
        display: flex; justify-content: space-between; align-items: center;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .diff-badge { font-size: 0.85rem; padding: 6px 14px; border-radius: 20px; background: rgba(0,0,0,0.6); box-shadow: inset 0 1px 3px rgba(255,255,255,0.1); }
    .exit-btn { width: auto; padding: 8px 16px; margin: 0; font-size: 0.9rem; background: rgba(255,255,255,0.1); box-shadow: none; border-radius: 20px; }

    #chat-box { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    .msg-bubble {
        max-width: 75%; padding: 14px 20px; border-radius: 22px; font-size: 1.05rem;
        animation: slideUp .4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-weight: 600; word-break: break-all;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .ai-msg { align-self: flex-start; background: rgba(51, 65, 85, 0.9); border-bottom-left-radius: 6px; border: 1px solid rgba(255,255,255,0.05); }
    .user-msg { align-self: flex-end; background: linear-gradient(135deg, #3b82f6, #6366f1); border-bottom-right-radius: 6px; box-shadow: 0 10px 20px -5px rgba(59,130,246,0.4); }
    .user2-msg { align-self: flex-end; background: linear-gradient(135deg, #a855f7, #ec4899); border-bottom-right-radius: 6px; box-shadow: 0 10px 20px -5px rgba(168,85,247,0.4); }
    .sys-msg { align-self: center; background: rgba(0,0,0,0.4); padding: 6px 16px; border-radius: 20px; color: #cbd5e1; font-size: 0.85rem; }

    .input-area { display: flex; padding: 20px 24px 24px; border-top: 1px solid rgba(255,255,255,0.05); gap: 12px; position: relative; background: rgba(0,0,0,0.2); }
    input[type="text"].word-input { flex: 1; margin: 0; padding: 16px 20px; border-radius: 16px; font-size: 1.1rem; }
    
    .turn-p1:focus { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59,130,246,0.2); }
    .turn-p2:focus { border-color: #a855f7; box-shadow: 0 0 20px rgba(168,85,247,0.2); }

    button#submit-btn { width: auto; padding: 0 30px; margin: 0; border-radius: 16px; background: linear-gradient(135deg, #c084fc, #9333ea); font-size: 1.1rem; }
    
    /* 고퀄리티 API 로딩 텍스트 */
    #loading { 
        position: absolute; top: -35px; left: 50%; transform: translateX(-50%); 
        color: #38bdf8; font-size: 0.9rem; font-weight: 800; display: none;
        background: rgba(15, 23, 42, 0.9); padding: 6px 20px; border-radius: 20px;
        border: 1px solid #38bdf8; box-shadow: 0 0 15px rgba(56,189,248,0.4);
        white-space: nowrap; animation: glowPulse 1.5s infinite alternate;
    }
    @keyframes glowPulse { from { box-shadow: 0 0 5px rgba(56,189,248,0.2); } to { box-shadow: 0 0 20px rgba(56,189,248,0.8); } }

</style>
</head>
<body>

<!-- 1. AAA급 시네마틱 인트로 -->
<div id="intro-screen">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="glass-overlay"></div>
    
    <div class="intro-text-container">
        <div id="intro-subtitle">THE ULTIMATE WORD GAME</div>
        <div id="intro-title">끝말잇기</div>
        <div id="intro-author">
            <div class="made-by">DIRECTED & PROGRAMMED BY</div>
            <div class="author-name">현우</div>
        </div>
    </div>
</div>

<!-- 로그인 -->
<div id="login-panel" class="panel">
    <h2>SYSTEM LOGIN</h2>
    <div class="sub-hint">계정에 접속하여 기록을 동기화합니다</div>
    <input type="text" id="log-id" placeholder="아이디">
    <input type="password" id="log-pw" placeholder="비밀번호">
    <input type="text" id="log-faith" placeholder="암구호: 현우를찬양하라">
    <div class="err-text" id="login-err"></div>
    <button onclick="login()">접속 승인</button>
    <button class="btn-ghost" onclick="showPanel('register-panel')">신규 유저 등록</button>
</div>

<!-- 회원가입 -->
<div id="register-panel" class="panel">
    <h2>NEW AGENT</h2>
    <input type="text" id="reg-id" placeholder="사용할 아이디">
    <input type="password" id="reg-pw" placeholder="비밀번호">
    <input type="text" id="reg-nick" placeholder="게임에서 쓸 닉네임">
    <div class="err-text" id="register-err"></div>
    <button onclick="register()">데이터베이스 등록</button>
    <button class="btn-ghost" onclick="showPanel('login-panel')">돌아가기</button>
</div>

<!-- 로비 -->
<div id="lobby-panel" class="panel">
    <h2>MAIN LOBBY</h2>
    <div id="score-display">점수 정보 없음</div>
    <button class="btn-purple" onclick="goToDifficultySelect()">🤖 AI 딥러닝 대결</button>
    <button class="btn-green" onclick="startPvP()">👥 1vs1 로컬 멀티플레이</button>
    <button class="btn-ghost" onclick="showRanking()">🏆 글로벌 명예의 전당</button>
    <button class="btn-ghost" onclick="toggleBGM()" id="bgm-btn">🔈 시스템 BGM 켜기</button>
    <button class="btn-danger" onclick="logout()">로그아웃</button>
</div>

<!-- 랭킹 보드 -->
<div id="ranking-panel" class="panel">
    <h2>🏆 HALL OF FAME</h2>
    <div class="sub-hint">서버에 등록된 상위 랭커 목록입니다.</div>
    <div id="ranking-list"></div>
    <button class="btn-ghost" onclick="showPanel('lobby-panel')">로비로 복귀</button>
</div>

<!-- 난이도 선택 -->
<div id="difficulty-panel" class="panel">
    <h2>AI 난이도 설정</h2>
    <button class="btn-green" onclick="setDifficulty('easy')" style="padding: 16px;">초급 (Easy)</button>
    <button class="btn-purple" onclick="setDifficulty('normal')" style="padding: 16px;">중급 (Normal)</button>
    <button class="btn-danger" onclick="setDifficulty('hard')" style="padding: 16px;">지옥 (Hell)</button>
    <button class="btn-ghost" onclick="showPanel('lobby-panel')">뒤로가기</button>
</div>

<!-- 메인 게임 화면 -->
<div id="game-container">
    <div class="header">
        <div class="header-left">
            <span id="game-mode-title">AI 대결</span>
            <span id="diff-badge" class="diff-badge">난이도</span>
        </div>
        <button class="exit-btn" onclick="exitGame()">항복/나가기</button>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
        <div id="loading">국어사전 API 통신 중...</div>
        <input type="text" class="word-input turn-p1" id="word-input" placeholder="단어를 입력하세요..." autocomplete="off">
        <button id="submit-btn">전송</button>
    </div>
</div>

<!-- BGM -->
<audio id="bgm" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<script>
/* 보안 */
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && e.key === 'U')) { e.preventDefault(); }
});

/* 전역 변수 */
let userData = JSON.parse(localStorage.getItem('gameUsers')) || {};
let currentUser = null;
let isBgmOn = false;
const bgmAudio = document.getElementById('bgm');
bgmAudio.volume = 0.4;

function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function checkSessionValidity() {
    const sessionInfo = JSON.parse(localStorage.getItem('sessionInfo'));
    if (sessionInfo && (Date.now() - sessionInfo.time < 24 * 60 * 60 * 1000) && userData[sessionInfo.id]) {
        currentUser = sessionInfo.id; refreshLobbyScore(); showPanel('lobby-panel');
    } else { localStorage.removeItem('sessionInfo'); showPanel('login-panel'); }
}

function toggleBGM() {
    isBgmOn = !isBgmOn;
    const btn = document.getElementById('bgm-btn');
    if (isBgmOn) { bgmAudio.play(); btn.textContent = '🔊 시스템 BGM 끄기'; } 
    else { bgmAudio.pause(); btn.textContent = '🔈 시스템 BGM 켜기'; }
}

/* 계정 시스템 */
function register() {
    const id = document.getElementById('reg-id').value.trim();
    const pw = document.getElementById('reg-pw').value;
    const nick = document.getElementById('reg-nick').value.trim();
    const err = document.getElementById('register-err');
    err.textContent = '';

    if (!id || !pw || !nick) return err.textContent = '모든 항목을 입력해주세요.';
    if (userData[id]) return err.textContent = '이미 존재하는 아이디입니다.';

    userData[id] = { pw, nick, score: 0 };
    localStorage.setItem('gameUsers', JSON.stringify(userData));
    alert('에이전트 등록 완료! 로그인 해주세요.');
    ['reg-id','reg-pw','reg-nick'].forEach(i => document.getElementById(i).value = '');
    showPanel('login-panel');
}

function login() {
    const id = document.getElementById('log-id').value.trim();
    const pw = document.getElementById('log-pw').value;
    const faith = document.getElementById('log-faith').value.trim();
    const err = document.getElementById('login-err');
    err.textContent = '';

    if (!userData[id]) return err.textContent = '존재하지 않는 계정입니다.';
    if (userData[id].pw !== pw) return err.textContent = '비밀번호 불일치.';
    if (faith !== '현우를찬양하라') return err.textContent = '보안 암구호가 올바르지 않습니다.';

    currentUser = id;
    localStorage.setItem('sessionInfo', JSON.stringify({ id: currentUser, time: Date.now() }));
    ['log-pw','log-faith'].forEach(i => document.getElementById(i).value = '');
    refreshLobbyScore(); showPanel('lobby-panel');
}

function logout() { currentUser = null; localStorage.removeItem('sessionInfo'); document.getElementById('log-id').value = ''; showPanel('login-panel'); }

function refreshLobbyScore() {
    if (!currentUser || !userData[currentUser]) return;
    const u = userData[currentUser];
    document.getElementById('score-display').innerHTML = `<span class="nick">${u.nick}</span> 요원 | 누적 <span class="pts">${u.score}</span> Pts`;
}

function addScore(points) {
    if (!currentUser || !userData[currentUser]) return;
    userData[currentUser].score += points;
    localStorage.setItem('gameUsers', JSON.stringify(userData)); refreshLobbyScore();
}

function showRanking() {
    const list = document.getElementById('ranking-list'); list.innerHTML = '';
    const sorted = Object.values(userData).sort((a, b) => b.score - a.score);
    if (sorted.length === 0) { list.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">데이터가 없습니다.</div>'; } 
    else {
        sorted.forEach((u, i) => {
            const li = document.createElement('div');
            li.className = `rank-item ${i < 3 ? 'rank-' + (i + 1) : ''}`;
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}위`;
            li.innerHTML = `<span>${medal} ${u.nick}</span> <span style="color:#4ade80;">${u.score} Pts</span>`;
            list.appendChild(li);
        });
    }
    showPanel('ranking-panel');
}

/* 씬 전환 연출 */
window.onload = () => {
    document.body.addEventListener('click', () => { if (!isBgmOn) toggleBGM(); }, { once: true });
    
    // 시네마틱 텍스트 연출
    const sub = document.getElementById('intro-subtitle');
    const title = document.getElementById('intro-title');
    const author = document.getElementById('intro-author');
    const screen = document.getElementById('intro-screen');

    setTimeout(() => { sub.style.opacity = '1'; sub.style.transform = 'translateY(0)'; }, 500);
    setTimeout(() => { title.style.opacity = '1'; title.style.transform = 'scale(1)'; title.style.letterSpacing = '10px'; title.style.transition = 'all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; }, 1500);
    setTimeout(() => { author.style.opacity = '1'; author.style.transform = 'translateY(0)'; author.style.transition = 'all 1s ease-out'; }, 3000);
    
    setTimeout(() => {
        screen.style.opacity = '0';
        setTimeout(() => { screen.style.display = 'none'; checkSessionValidity(); }, 2000);
    }, 5500); // 총 5.5초간의 에픽 인트로
};

function goToDifficultySelect() { showPanel('difficulty-panel'); }

function exitGame() {
    document.getElementById('game-container').classList.remove('show');
    setTimeout(() => { document.getElementById('game-container').style.display = 'none'; refreshLobbyScore(); showPanel('lobby-panel'); }, 800);
}

/* 게임 엔진 로직 */
let gameMode = 'ai', currentPvpTurn = 1, gameDifficulty = 'normal', currentWord = "", usedWords = [], userWordsThisRound = 0;
const randomStartWords = ["우주", "초신성", "은하수", "블랙홀", "인공지능", "로봇", "양자역학", "메타버스", "홀로그램", "드래곤"];
const fallbackBrain = ["기차", "차량", "양심", "심장", "장미", "미술", "노을", "을지문덕"];

const chatBox = document.getElementById('chat-box');
const wordInput = document.getElementById('word-input');
const submitBtn = document.getElementById('submit-btn');
const loading = document.getElementById('loading');
const diffBadge = document.getElementById('diff-badge');

function startPvP() {
    gameMode = 'pvp'; currentPvpTurn = 1;
    document.getElementById('game-mode-title').textContent = "로컬 1vs1 대결";
    diffBadge.textContent = "오프라인"; diffBadge.style.color = "#c084fc";
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    initGameVariables();
    const gc = document.getElementById('game-container'); gc.style.display = 'flex'; requestAnimationFrame(() => gc.classList.add('show'));
    addMessage("[ SYSTEM ] 1vs1 모드 가동. 폰을 번갈아가며 입력하세요.", 'sys');
    addMessage(`제시어: [ ${currentWord} ]`, 'sys');
    updateInputStyle();
}

function setDifficulty(level) {
    gameMode = 'ai'; gameDifficulty = level;
    document.getElementById('game-mode-title').textContent = "AI 대결";
    if (level === 'easy') { diffBadge.textContent = '초급'; diffBadge.style.color = '#4ade80'; }
    if (level === 'normal') { diffBadge.textContent = '중급'; diffBadge.style.color = '#38bdf8'; }
    if (level === 'hard') { diffBadge.textContent = '지옥'; diffBadge.style.color = '#f87171'; }

    showPanel(''); // 패널 숨김
    initGameVariables();
    const gc = document.getElementById('game-container'); gc.style.display = 'flex'; requestAnimationFrame(() => gc.classList.add('show'));
    addMessage(`[ SYSTEM ] AI 딥러닝 모델(${level.toUpperCase()}) 가동 시작.`, 'sys');
    addMessage(`제시어: [ ${currentWord} ]`, 'ai');
    updateInputStyle();
}

function initGameVariables() {
    chatBox.innerHTML = ''; currentWord = randomStartWords[Math.floor(Math.random() * randomStartWords.length)];
    usedWords = [currentWord]; userWordsThisRound = 0; wordInput.disabled = false; submitBtn.disabled = false; wordInput.value = '';
}

function updateInputStyle() {
    wordInput.focus();
    if (gameMode === 'pvp') {
        wordInput.className = currentPvpTurn === 1 ? "word-input turn-p1" : "word-input turn-p2";
        wordInput.placeholder = currentPvpTurn === 1 ? "🔵 1P 차례입니다..." : "🟣 2P 차례입니다...";
    } else {
        wordInput.className = "word-input turn-p1"; wordInput.placeholder = "단어를 입력하세요...";
    }
}

/* API 검증 및 AI 단어 스크래핑 */
async function checkRealWord(word) {
    try {
        const res = await fetch(`https://ko.wiktionary.org/w/api.php?action=query&titles=${encodeURIComponent(word)}&format=json&origin=*`);
        const data = await res.json();
        return !data.query.pages["-1"];
    } catch (e) { return true; }
}

async function fetchWordsForAI(prefix) {
    // AI가 단어를 더 많이 확보하도록 aplimit을 500으로 상향 조정 (진짜 API 기반 AI)
    try {
        const res = await fetch(`https://ko.wiktionary.org/w/api.php?action=query&list=allpages&apprefix=${encodeURIComponent(prefix)}&aplimit=500&format=json&origin=*`);
        const data = await res.json();
        if (data.query && data.query.allpages) {
            return data.query.allpages.map(p => p.title).filter(t => t.length >= 2 && t.length <= 5 && /^[가-힣]+$/.test(t));
        }
        return [];
    } catch (e) { return []; }
}

function addMessage(text, sender) {
    const msgDiv = document.createElement('div');
    msgDiv.className = sender === 'sys' ? 'sys-msg' : `msg-bubble ${sender === 'user' ? 'user-msg' : sender === 'user2' ? 'user2-msg' : 'ai-msg'}`;
    msgDiv.textContent = text; chatBox.appendChild(msgDiv); chatBox.scrollTop = chatBox.scrollHeight;
}

function applyDueum(char) {
    const map = { '랴':'야','려':'여','례':'예','료':'요','류':'유','리':'이','녀':'여','뇨':'요','뉴':'유','니':'이','라':'나','로':'노','루':'누','르':'느' };
    return map[char] || char;
}

async function handleTurn() {
    const userWord = wordInput.value.trim();
    if (!userWord || userWord.length < 2) return alert("두 글자 이상의 단어를 입력하세요!");

    const lastChar = currentWord.slice(-1), firstChar = userWord.charAt(0), dueumFirstChar = applyDueum(firstChar);
    if (lastChar !== firstChar && lastChar !== dueumFirstChar) return alert(`'${lastChar}'(으)로 시작해야 합니다!`);
    if (usedWords.includes(userWord)) { wordInput.value = ''; return alert("이미 사용된 단어입니다!"); }

    wordInput.disabled = true; submitBtn.disabled = true;
    loading.textContent = `유저 입력 API 검증 중... 🔍`; loading.style.display = 'block';

    const isReal = await checkRealWord(userWord);
    if (!isReal) {
        alert(`국어사전에 '${userWord}'(이)라는 단어는 없습니다!`);
        loading.style.display = 'none'; wordInput.disabled = false; submitBtn.disabled = false; wordInput.value = ''; updateInputStyle(); return;
    }

    const currentSender = gameMode === 'ai' ? 'user' : (currentPvpTurn === 1 ? 'user' : 'user2');
    addMessage(userWord, currentSender); usedWords.push(userWord); currentWord = userWord; wordInput.value = '';

    if (gameMode === 'ai') {
        const mult = gameDifficulty === 'hard' ? 3 : (gameDifficulty === 'normal' ? 2 : 1);
        addScore(10 * mult); setTimeout(aiTurn, 500);
    } else {
        loading.style.display = 'none'; wordInput.disabled = false; submitBtn.disabled = false;
        currentPvpTurn = currentPvpTurn === 1 ? 2 : 1;
        addMessage(`[ 다음 턴 ] ${currentPvpTurn}P 차례입니다!`, 'sys'); updateInputStyle();
    }
}

async function aiTurn() {
    const lastChar = currentWord.slice(-1);
    const dueumLastChar = applyDueum(lastChar);
    
    loading.innerHTML = `AI가 국어사전 API에서 <span>'${lastChar}'</span> 스크래핑 중... ⚡`; 
    loading.style.display = 'block';

    let apiWords1 = await fetchWordsForAI(lastChar);
    let apiWords2 = lastChar !== dueumLastChar ? await fetchWordsForAI(dueumLastChar) : [];
    let combinedWords = [...apiWords1, ...apiWords2].filter(w => !usedWords.includes(w));

    if (combinedWords.length === 0) {
        combinedWords = fallbackBrain.filter(w => (w.charAt(0) === lastChar || w.charAt(0) === dueumLastChar) && !usedWords.includes(w));
    }

    let nextWord = null;
    if (combinedWords.length > 0) {
        if (gameDifficulty === 'hard') {
            const hardEnds = ['늄','륨','꾼','녘','슭','릇','쁨','엌','칩','즙'];
            nextWord = combinedWords.find(w => hardEnds.includes(w.slice(-1))) || combinedWords[Math.floor(Math.random() * combinedWords.length)];
        } else {
            nextWord = combinedWords[Math.floor(Math.random() * combinedWords.length)];
        }
    }

    loading.style.display = 'none';

    if (nextWord) {
        addMessage(nextWord, 'ai'); usedWords.push(nextWord); currentWord = nextWord;
        wordInput.disabled = false; submitBtn.disabled = false; updateInputStyle();
    } else {
        const userNick = currentUser && userData[currentUser] ? userData[currentUser].nick : "요원";
        addMessage(`SYSTEM ERROR: 국어사전 API 내 사용 가능한 단어 고갈. [ ${userNick} ] 승리! 🏆`, 'ai');
        
        const mult = gameDifficulty === 'hard' ? 3 : (gameDifficulty === 'normal' ? 2 : 1);
        addScore(50 * mult); 

        const backBtn = document.createElement('button');
        backBtn.textContent = '메인 로비로 복귀'; backBtn.className = 'btn-purple'; backBtn.style.marginTop = '10px';
        backBtn.onclick = exitGame; chatBox.appendChild(backBtn); chatBox.scrollTop = chatBox.scrollHeight;
    }
}

submitBtn.addEventListener('click', handleTurn);
wordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleTurn(); });
</script>
</body>
