<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>끝말잇기 - made by 현우</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; user-select: none; }
        body { 
            margin: 0; padding: 0; 
            background-color: #050505; 
            color: #f8fafc; 
            height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
        }

        /* 1. 인트로 씬 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s ease-in-out;
        }
        .intro-text {
            font-size: 4rem; font-weight: 900; letter-spacing: 10px;
            opacity: 0;
            background: linear-gradient(135deg, #fff, #888);
            -webkit-background-clip: text; color: transparent;
            animation: fadeIn 1s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        /* 2. 난이도 선택 씬 */
        #difficulty-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            z-index: 9000; display: none; flex-direction: column; justify-content: center; align-items: center; gap: 30px;
            opacity: 0; transition: opacity 1s ease;
        }
        .diff-title { font-size: 2.5rem; font-weight: 800; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .diff-btn {
            padding: 15px 50px; font-size: 1.5rem; font-weight: bold; border-radius: 30px; border: none;
            cursor: pointer; transition: all 0.3s ease; width: 250px;
        }
        .btn-easy { background: linear-gradient(135deg, #4ade80, #16a34a); color: white; box-shadow: 0 0 20px rgba(74, 222, 128, 0.4); }
        .btn-normal { background: linear-gradient(135deg, #60a5fa, #2563eb); color: white; box-shadow: 0 0 20px rgba(96, 165, 250, 0.4); }
        .btn-hard { background: linear-gradient(135deg, #f87171, #dc2626); color: white; box-shadow: 0 0 20px rgba(248, 113, 113, 0.4); }
        .diff-btn:hover { transform: scale(1.05); }

        /* 3. 메인 게임 UI */
        #game-container {
            width: 100%; max-width: 500px; height: 90vh;
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            display: flex; flex-direction: column;
            opacity: 0; transform: translateY(20px); transition: all 1s ease; display: none;
        }
        #game-container.show { opacity: 1; transform: translateY(0); display: flex; }

        .header {
            padding: 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 1.5rem; font-weight: 700; color: #fff;
            display: flex; justify-content: space-between; align-items: center;
        }
        .diff-badge { font-size: 0.9rem; padding: 5px 12px; border-radius: 10px; background: rgba(0,0,0,0.5); }

        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        .msg-bubble {
            max-width: 75%; padding: 12px 18px; border-radius: 20px; font-size: 1.1rem;
            animation: slideUp 0.3s ease-out; font-weight: 500; word-break: break-all;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .ai-msg { align-self: flex-start; background: #334155; border-bottom-left-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .user-msg { align-self: flex-end; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-bottom-right-radius: 5px; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
        .sys-msg { align-self: center; background: transparent; color: #94a3b8; font-size: 0.9rem; text-align: center; }

        .input-area { display: flex; padding: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); gap: 10px; position: relative; }
        input[type="text"] {
            flex: 1; padding: 15px; border-radius: 12px; border: none;
            background: rgba(15, 23, 42, 0.8); color: #fff; font-size: 1.1rem; outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); transition: 0.3s;
        }
        input[type="text"]:focus { box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 0 2px #c084fc; }
        
        button#submit-btn {
            padding: 0 25px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.1rem;
            background: linear-gradient(135deg, #c084fc, #9333ea); color: white; cursor: pointer;
            box-shadow: 0 4px 15px rgba(147, 51, 234, 0.4); transition: transform 0.1s;
        }
        button#submit-btn:active { transform: scale(0.95); }
        
        #loading { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); color: #38bdf8; font-size: 0.9rem; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <!-- 1. 인트로 씬 -->
    <div id="intro-screen">
        <div id="intro-title" class="intro-text">끝말잇기</div>
        <div id="intro-author" class="intro-text" style="display: none; font-size: 2rem;">made by 현우</div>
    </div>

    <!-- 2. 난이도 선택 씬 -->
    <div id="difficulty-screen">
        <div class="diff-title">난이도 선택</div>
        <button class="diff-btn btn-easy" onclick="setDifficulty('easy')">초급 (Easy)</button>
        <button class="diff-btn btn-normal" onclick="setDifficulty('normal')">중급 (Normal)</button>
        <button class="diff-btn btn-hard" onclick="setDifficulty('hard')">지옥 (Hell)</button>
    </div>

    <!-- 3. 메인 게임 씬 -->
    <div id="game-container">
        <div class="header">
            <span>AI 대결</span>
            <span id="diff-badge" class="diff-badge">난이도</span>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <div id="loading">생각 중...</div>
            <input type="text" id="word-input" placeholder="단어를 입력하세요..." autocomplete="off">
            <button id="submit-btn">전송</button>
        </div>
    </div>

    <script>
        // 소스코드 보호 보안 로직
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });
        setInterval(() => { (function() { return false; }['constructor']('debugger')()); }, 50);

        let gameDifficulty = 'normal';

        window.onload = () => {
            const introTitle = document.getElementById('intro-title');
            const introAuthor = document.getElementById('intro-author');
            const introScreen = document.getElementById('intro-screen');
            const diffScreen = document.getElementById('difficulty-screen');

            setTimeout(() => {
                introTitle.style.display = 'none';
                setTimeout(() => {
                    introAuthor.style.display = 'block';
                    setTimeout(() => {
                        introScreen.style.opacity = '0';
                        setTimeout(() => {
                            introScreen.style.display = 'none';
                            diffScreen.style.display = 'flex';
                            setTimeout(() => diffScreen.style.opacity = '1', 50);
                        }, 1000);
                    }, 2000);
                }, 1000);
            }, 2000);
        };

        function setDifficulty(level) {
            gameDifficulty = level;
            document.getElementById('difficulty-screen').style.opacity = '0';
            
            const badge = document.getElementById('diff-badge');
            if(level === 'easy') { badge.textContent = '초급'; badge.style.color = '#4ade80'; }
            if(level === 'normal') { badge.textContent = '중급'; badge.style.color = '#60a5fa'; }
            if(level === 'hard') { badge.textContent = '지옥'; badge.style.color = '#f87171'; }

            setTimeout(() => {
                document.getElementById('difficulty-screen').style.display = 'none';
                const gc = document.getElementById('game-container');
                gc.classList.add('show');
                startGame();
            }, 1000);
        }

        // 유저 입력 단어 실존 여부 체크 API
        async function checkRealWord(word) {
            try {
                const response = await fetch(`https://ko.wiktionary.org/w/api.php?action=query&titles=${word}&format=json&origin=*`);
                const data = await response.json();
                if (data.query.pages["-1"]) return false;
                return true;
            } catch (error) {
                return true; 
            }
        }

        // 🌟 핵심 업그레이드: AI가 실시간으로 국어사전 API에서 단어를 찾아내는 무한 엔진 🌟
        async function fetchWordsFromDictionary(prefix) {
            try {
                const response = await fetch(`https://ko.wiktionary.org/w/api.php?action=query&list=allpages&apprefix=${prefix}&aplimit=100&format=json&origin=*`);
                const data = await response.json();
                if (data.query && data.query.allpages) {
                    // 특수 기호나 한 글자 단어를 제외하고, 순수 한국어 단어만 필터링
                    return data.query.allpages
                        .map(p => p.title)
                        .filter(title => title.length >= 2 && title.length <= 6 && /^[가-힣]+$/.test(title));
                }
                return [];
            } catch (e) {
                return [];
            }
        }

        const chatBox = document.getElementById('chat-box');
        const wordInput = document.getElementById('word-input');
        const submitBtn = document.getElementById('submit-btn');
        const loading = document.getElementById('loading');

        let currentWord = "컴퓨터"; 
        let usedWords = ["컴퓨터"];

        // API 비상용 혹은 예외적인 상황을 위한 기본 백업 단어장
        const fallbackBrain = ["터미널", "기차", "차량", "양심", "심장", "장미", "미술", "노을", "을지문덕"];

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = sender === 'sys' ? 'sys-msg' : `msg-bubble ${sender === 'user' ? 'user-msg' : 'ai-msg'}`;
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function startGame() {
            addMessage(`[ ${gameDifficulty.toUpperCase()} 모드 ] 게임을 시작합니다.`, 'sys');
            addMessage(`제시어: [ ${currentWord} ]`, 'ai');
            wordInput.focus();
        }

        function applyDueum(char) {
            const dueumMap = { '랴':'야', '려':'여', '례':'예', '료':'요', '류':'유', '리':'이', '녀':'여', '뇨':'요', '뉴':'유', '니':'이', '라':'나', '로':'노', '루':'누', '르':'느' };
            return dueumMap[char] || char;
        }

        async function handleTurn() {
            const userWord = wordInput.value.trim();
            if(!userWord) return;

            if(userWord.length < 2) { alert("두 글자 이상의 단어를 입력하세요!"); return; }

            const lastChar = currentWord.slice(-1);
            const firstChar = userWord.charAt(0);
            const dueumFirstChar = applyDueum(firstChar);
            
            if(lastChar !== firstChar && lastChar !== dueumFirstChar) {
                alert(`'${lastChar}'(으)로 시작하는 단어를 입력해야 합니다!`);
                return;
            }

            if(usedWords.includes(userWord)) {
                alert("이미 사용된 단어입니다!"); wordInput.value = ''; return;
            }

            wordInput.disabled = true; submitBtn.disabled = true;
            loading.style.display = 'block';

            const isReal = await checkRealWord(userWord);
            
            if (!isReal) {
                alert(`국어사전에 '${userWord}'(이)라는 단어는 없습니다!`);
                loading.style.display = 'none';
                wordInput.disabled = false; submitBtn.disabled = false;
                wordInput.value = ''; wordInput.focus();
                return;
            }

            addMessage(userWord, 'user');
            usedWords.push(userWord);
            currentWord = userWord;
            wordInput.value = '';

            setTimeout(aiTurn, 300);
        }

        async function aiTurn() {
            loading.style.display = 'block';
            const lastChar = currentWord.slice(-1);
            const dueumLastChar = applyDueum(lastChar);
            
            // 1. 일반 글자와 두음법칙 글자 둘 다 사전 API에서 검색 실행
            let apiWords1 = await fetchWordsFromDictionary(lastChar);
            let apiWords2 = lastChar !== dueumLastChar ? await fetchWordsFromDictionary(dueumLastChar) : [];
            
            let combinedWords = [...apiWords1, ...apiWords2].filter(word => !usedWords.includes(word));

            // 만약 API 결과가 없으면 코드 내 백업 단어장에서 찾음
            if (combinedWords.length === 0) {
                combinedWords = fallbackBrain.filter(word => 
                    (word.charAt(0) === lastChar || word.charAt(0) === dueumLastChar) && !usedWords.includes(word)
                );
            }

            let nextWord = null;

            if (combinedWords.length > 0) {
                if (gameDifficulty === 'hard') {
                    // 지옥 모드: '늄', '륨', '녘', '꾼' 등 강력한 단어로 끝나는 단어를 우선 탐색
                    const hardEnds = ['늄', '륨', '꾼', '녘', '슭', '릇', '쁨', '엌', '칩', '즙'];
                    nextWord = combinedWords.find(w => hardEnds.includes(w.slice(-1))) || combinedWords[Math.floor(Math.random() * combinedWords.length)];
                } else if (gameDifficulty === 'easy') {
                    // 초급 모드: 무조건 2글자의 가장 대중적인 단어 위주로 선택
                    const easyWords = combinedWords.filter(w => w.length === 2);
                    nextWord = easyWords.length > 0 ? easyWords[Math.floor(Math.random() * easyWords.length)] : combinedWords[0];
                } else {
                    // 중급 모드: 랜덤 선택
                    nextWord = combinedWords[Math.floor(Math.random() * combinedWords.length)];
                }
            }

            loading.style.display = 'none';

            if (nextWord) {
                addMessage(nextWord, 'ai');
                usedWords.push(nextWord);
                currentWord = nextWord;
                wordInput.disabled = false; submitBtn.disabled = false; wordInput.focus();
            } else {
                addMessage("크윽... 전 세계 사전을 다 뒤졌지만 더 이상 단어가 없습니다. 현우님의 대승리입니다! 🏆", 'ai');
                addMessage("[ 게임 종료 - 새로고침하여 다시 시작하세요 ]", 'sys');
            }
        }

        submitBtn.addEventListener('click', handleTurn);
        wordInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleTurn(); });
    </script>
</body>
</html>
