<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>끝말잇기 - Ultimate Edition</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { margin: 0; background: #050505; color: white; font-family: 'Pretendard'; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* 인트로(간지 강화) */
        #intro-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .glitch { font-size: 5rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px #38bdf8; animation: pulse 2s infinite; }
        .touch-text { font-size: 1.2rem; margin-top: 20px; opacity: 0.6; animation: blink 1.5s infinite; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* 패널 공통 */
        .panel { display: none; width: 350px; padding: 30px; background: rgba(20, 20, 25, 0.9); border-radius: 20px; border: 1px solid #333; }
        .panel.active { display: block; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; background: #111; color: white; }
        button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; background: #38bdf8; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 인트로 -->
    <div id="intro-screen" onclick="startApp()">
        <div class="glitch">끝말잇기</div>
        <div class="touch-text">TOUCH TO START</div>
    </div>

    <!-- 설정/안내 -->
    <div id="settings-panel" class="panel">
        <h2>설정</h2>
        <button onclick="toggleBGM()">BGM ON/OFF</button>
        <button onclick="alert('가이드: 단어를 입력하고 전송하세요! 닉네임을 설정하면 AI가 당신을 불러줍니다.')">안내 가이드</button>
        <button onclick="showPanel('login-panel')">뒤로가기</button>
    </div>

    <!-- 로그인 -->
    <div id="login-panel" class="panel active">
        <h2>로그인</h2>
        <input type="text" id="log-id" placeholder="아이디">
        <input type="password" id="log-pw" placeholder="비밀번호">
        <input type="text" id="log-faith" placeholder="현우를찬양하라">
        <button onclick="login()">로그인</button>
        <button onclick="showPanel('register-panel')">회원가입</button>
        <button onclick="showPanel('settings-panel')">설정</button>
    </div>

    <!-- 회원가입 -->
    <div id="register-panel" class="panel">
        <h2>회원가입</h2>
        <input type="text" id="reg-id" placeholder="아이디">
        <input type="password" id="reg-pw" placeholder="비밀번호">
        <input type="text" id="reg-nick" placeholder="닉네임">
        <button onclick="register()">가입하기</button>
    </div>

    <!-- 로비/점수/랭킹 -->
    <div id="lobby-panel" class="panel">
        <h2>로비</h2>
        <div id="score-display">내 점수: 0</div>
        <button onclick="startGame()">게임 시작</button>
        <button onclick="alert('랭킹 시스템은 현재 준비 중입니다.')">랭킹 (준비중)</button>
        <button onclick="location.reload()">로그아웃</button>
    </div>

    <!-- BGM -->
    <audio id="bgm" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        let userData = JSON.parse(localStorage.getItem('gameUsers')) || {};
        let currentUser = null;
        let isBgmOn = false;

        function startApp() {
            document.getElementById('intro-screen').style.display = 'none';
        }

        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleBGM() {
            const audio = document.getElementById('bgm');
            isBgmOn = !isBgmOn;
            isBgmOn ? audio.play() : audio.pause();
        }

        function register() {
            const id = document.getElementById('reg-id').value;
            const nick = document.getElementById('reg-nick').value;
            userData[id] = { pw: document.getElementById('reg-pw').value, nick: nick, score: 0 };
            localStorage.setItem('gameUsers', JSON.stringify(userData));
            alert("가입 완료!");
            showPanel('login-panel');
        }

        function login() {
            const id = document.getElementById('log-id').value;
            const faith = document.getElementById('log-faith').value;
            if(faith === "현우를찬양하라" && userData[id]) {
                currentUser = id;
                document.getElementById('score-display').innerText = `닉네임: ${userData[id].nick} | 점수: ${userData[id].score}`;
                showPanel('lobby-panel');
            } else {
                alert("찬양 문구가 틀렸거나 없는 계정입니다.");
            }
        }

        function startGame() {
            alert(userData[currentUser].nick + "님, 게임을 시작합니다!");
            // 게임 로직 연결...
        }

        // F12 보안 트랩
        document.addEventListener('keydown', e => { if(e.key === 'F12') { alert("접근 불가"); location.reload(); } });
    </script>
</body>
</html>
